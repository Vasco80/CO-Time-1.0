<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CO-Time">
    <meta name="format-detection" content="telephone=no">
    <meta name="color-scheme" content="dark">
    <meta name="application-name" content="CO-Time">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-config" content="browserconfig.xml">

    <title>CO-Time</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
    <link rel="icon" href="icons/favicon.ico" sizes="any">
    <link rel="shortcut icon" href="icons/favicon.ico">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========================= -->
    <!-- CONFIGURAZIONE -->
    <!-- ========================= -->

    <main id="setupScreen" hidden>

        <h1>CO-Time</h1>

        <div id="coInputs">

            <div class="coRow">
                <span>CO1</span>
                <input id="co1hh" type="number" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input id="co1mm" type="number" min="0" max="59" placeholder="MM">
                <span>:</span>
                <input id="co1ss" type="number" min="0" max="59" placeholder="SS">
            </div>

            <div class="coRow">
                <span>CO2</span>
                <input id="co2hh" type="number" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input id="co2mm" type="number" min="0" max="59" placeholder="MM">
                <span>:</span>
                <input id="co2ss" type="number" min="0" max="59" placeholder="SS">
            </div>

            <div class="coRow">
                <span>CO3</span>
                <input id="co3hh" type="number" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input id="co3mm" type="number" min="0" max="59" placeholder="MM">
                <span>:</span>
                <input id="co3ss" type="number" min="0" max="59" placeholder="SS">
            </div>

            <div class="coRow">
                <span>CO4</span>
                <input id="co4hh" type="number" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input id="co4mm" type="number" min="0" max="59" placeholder="MM">
                <span>:</span>
                <input id="co4ss" type="number" min="0" max="59" placeholder="SS">
            </div>

            <div class="coRow">
                <span>CO5</span>
                <input id="co5hh" type="number" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input id="co5mm" type="number" min="0" max="59" placeholder="MM">
                <span>:</span>
                <input id="co5ss" type="number" min="0" max="59" placeholder="SS">
            </div>

            <div class="coRow">
                <span>CO6</span>
                <input id="co6hh" type="number" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input id="co6mm" type="number" min="0" max="59" placeholder="MM">
                <span>:</span>
                <input id="co6ss" type="number" min="0" max="59" placeholder="SS">
            </div>

        </div>

        <button id="startButton">
            START
        </button>

    </main>

    <!-- ========================= -->
    <!-- OPERATIVA -->
    <!-- ========================= -->

 <main id="runScreen">

    <div id="progress"></div>

    <div id="flash"></div>

    <div class="display">

        <div id="clockWrapper" class="clockWrapper">
            <div id="clock">
                00:00:00.00
            </div>
        </div>

        <div id="homeControls">
            <button id="homeCoButton" type="button" aria-label="Apri setup CO">CO</button>
            <div id="countdownWrapper" class="countdownWrapper">
            <div id="countdown" class="homeCountdown" hidden>
                00:00.00
            </div>
        </div>
        </div>

    </div>

    <div class="display operational" hidden>

        <div id="coLabel">
            CO 1/1
        </div>

        <div id="coTime">
            00:00:00
        </div>

    </div>

</main>

    <!-- ========================= -->
    <!-- FINE -->
    <!-- ========================= -->

    <main id="finishScreen" hidden>

        <div id="finishTitle">
            MISSIONE COMPLETATA
        </div>

        <div id="finishClock">
            00:00:00.00
        </div>

        <button id="resetButton">
            RESET
        </button>

        <button id="backToHomeButton" type="button" style="margin-top: 12px;">Torna alla schermata principale</button>

    </main>

    <button id="setupButton" type="button" aria-label="Apri setup">⚙️</button>

    <div id="setupModal" hidden>
        <div class="modalDialog" role="dialog" aria-modal="true" aria-labelledby="setupModalTitle">
            <div class="modalHeader">
                <h2 id="setupModalTitle">Setup</h2>
            </div>

            <div class="modalContent">
                <div class="syncSection">
                    <h3>SINCRONIZZAZIONE ORARIO</h3>

                    <div class="syncControl">
                        <span class="syncControlLabel">Minuti</span>
                        <div class="syncButtons">
                            <button class="syncButton" type="button" data-sync-unit="minutes" data-sync-step="-1">-</button>
                            <span id="syncMinutesValue" class="syncValue">0</span>
                            <button class="syncButton" type="button" data-sync-unit="minutes" data-sync-step="1">+</button>
                        </div>
                    </div>

                    <div class="syncControl">
                        <span class="syncControlLabel">Secondi</span>
                        <div class="syncButtons">
                            <button class="syncButton" type="button" data-sync-unit="seconds" data-sync-step="-1">-</button>
                            <span id="syncSecondsValue" class="syncValue">0</span>
                            <button class="syncButton" type="button" data-sync-unit="seconds" data-sync-step="1">+</button>
                        </div>
                    </div>

                    <div class="syncControl">
                        <span class="syncControlLabel">Centesimi</span>
                        <div class="syncButtons">
                            <button class="syncButton" type="button" data-sync-unit="centiseconds" data-sync-step="-1">-</button>
                            <span id="syncCentisecondsValue" class="syncValue">0</span>
                            <button class="syncButton" type="button" data-sync-unit="centiseconds" data-sync-step="1">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modalActions">
                <button id="saveSyncButton" type="button">Salva</button>
                <button id="resetSyncButton" type="button">Azzera sincronizzazione</button>
                <button id="closeSetupModalButton" type="button">Chiudi</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
